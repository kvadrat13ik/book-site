<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Старинная книга</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* КНИГА */
  #book {
    width: 900px;
    height: 600px;
    box-shadow: 0 10px 60px rgba(0,0,0,1);
  }

  /* СТРАНИЦА С ВАШЕЙ ТЕКСТУРОЙ */
  .page {
    width: 450px;
    height: 600px;
    background-color: #f4e4c1;
    /* ВСТАВЛЕНО ВАШЕ ИМЯ ФАЙЛА */
    background-image: url('file_000000007ed872439039a19be0aaa10f.jpg'); 
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
  }

  /* ОБЛОЖКА (Первая и последняя) */
  .hard {
    background: #3d2b16 !important; 
    background-image: url('https://www.transparenttextures.com/patterns/leather.png') !important;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6) !important;
  }

  /* ВНУТРЕННИЕ СТРАНИЦЫ (Мягкие) */
  .inner-page {
    /* Легкая тень в центре для объема */
    box-shadow: inset 25px 0 35px -25px rgba(0,0,0,0.4);
  }

  /* УПРАВЛЕНИЕ */
  .controls {
    margin-top: 30px;
    display: flex;
    gap: 20px;
  }

  .btn {
    padding: 12px 30px;
    background: #4a2f15;
    color: #e2c799;
    border: 1px solid #3d2b16;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 18px;
    user-select: none;
    transition: 0.3s;
  }

  .btn:hover { background: #5a3b1e; }
</style>
</head>
<body>

<div id="book">
  <div class="page hard"></div>

  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>

  <div class="page hard"></div>
</div>

<div class="controls">
  <div class="btn" id="prev">◀ Назад</div>
  <div class="btn" id="next">Вперед ▶</div>
</div>

<script>
  $(document).ready(function() {
    // Инициализация мягкого перелистывания
    $('#book').turn({
      width: 900,
      height: 600,
      autoCenter: true,
      duration: 1400, // Скорость
      gradients: true, // Тени при изгибе
      acceleration: true
    });

    // Кнопки
    $('#prev').click(function() { $('#book').turn('previous'); });
    $('#next').click(function() { $('#book').turn('next'); });

    // Клавиатура
    $(window).bind('keydown', function(e){
      if (e.keyCode == 37) $('#book').turn('previous');
      else if (e.keyCode == 39) $('#book').turn('next');
    });
  });
</script>

</body>
</html>
