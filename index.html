<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
  }

  .book {
    position: relative;
    width: 450px; /* Ширина ОДНОЙ страницы */
    height: 550px;
    perspective: 1500px;
  }

  .spine {
    position: absolute;
    width: 10px;
    height: 100%;
    left: -5px; /* Прямо по центру разворота */
    background: #3d2b16;
    z-index: 100;
    border-radius: 2px;
  }

  .page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: #f4e4c1;
    /* Важно: вращение всегда от левого края */
    transform-origin: left center; 
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
    box-shadow: inset 3px 0 10px rgba(0,0,0,0.1);
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }

  /* Текстура бумаги */
  .page::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(0,0,0,0.1) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.05) 100%);
    pointer-events: none;
  }

  .page-content {
    padding: 40px;
    backface-visibility: hidden; /* Скрываем текст, когда страница перевернута */
  }

  /* Состояние перевернутой страницы */
  .page.flipped {
    transform: rotateY(-180deg);
  }

  /* Кнопки управления */
  .controls {
    position: fixed;
    bottom: 20px;
    display: flex;
    gap: 20px;
  }

  .btn {
    cursor: pointer;
    background: #5a3b1e;
    padding: 10px 25px;
    color: #fff;
    border-radius: 5px;
    user-select: none;
  }
</style>
</head>
<body>

<div class="book" id="book">
  <div class="spine"></div>

  <div class="page" style="z-index: 1;">
    <div class="page-content">
      <h2>Конец</h2>
      <p>Последняя страница.</p>
    </div>
  </div>

  <div class="page" style="z-index: 2;">
    <div class="page-content">
      <h2>Страница 2</h2>
      <p>Текст второй страницы...</p>
    </div>
  </div>

  <div class="page" style="z-index: 3;">
    <div class="page-content">
      <h2>Страница 1</h2>
      <p>Добро пожаловать в книгу!</p>
    </div>
  </div>
</div>

<div class="controls">
  <div class="btn" id="prev">Назад</div>
  <div class="btn" id="next">Вперед</div>
</div>

<script>
  const pages = document.querySelectorAll(".page");
  let current = pages.length - 1; // Начинаем с верхней страницы

  document.getElementById("next").onclick = () => {
    if (current >= 0) {
      pages[current].classList.add("flipped");
      // После поворота уменьшаем z-index, чтобы страница не перекрывала кнопки
      setTimeout(() => {
        pages[current + 1 === pages.length ? current : current].style.zIndex = 0;
      }, 600);
      current--;
    }
  };

  document.getElementById("prev").onclick = () => {
    if (current < pages.length - 1) {
      current++;
      pages[current].classList.remove("flipped");
      pages[current].style.zIndex = pages.length - current;
    }
  };
</script>

</body>
</html>
