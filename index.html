<body>

<div id="book">
  <div class="page hard"></div>
     
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>
  <div class="page inner-page"></div>

  <div class="page hard"></div>
</div>

<div class="controls">
  <div class="btn" id="prev">◀</div>
  <div class="btn" id="next">▶</div>
</div>

<script>
  $(document).ready(function() {
    // Инициализация мягкого перелистывания
    $('#book').turn({
      width: 900,
      height: 600,
      autoCenter: true,
      duration: 1400, // Скорость
      gradients: true, // Тени при изгибе
      acceleration: true
    });

    // Кнопки
    $('#prev').click(function() { $('#book').turn('previous'); });
    $('#next').click(function() { $('#book').turn('next'); });

    // Клавиатура
    $(window).bind('keydown', function(e){
      if (e.keyCode == 37) $('#book').turn('previous');
      else if (e.keyCode == 39) $('#book').turn('next');
    });
  });
</script>

</body>
</html>
