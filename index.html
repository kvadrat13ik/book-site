<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Старинная книга</title>
<style>
body {
  margin: 0;
  background: #c8b38c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: "Georgia", serif;
}

.book-container {
  perspective: 2000px;
  width: 800px;
  height: 500px;
  position: relative;
}

.book {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.page {
  width: 50%;
  height: 100%;
  background: #fdf5e6;
  position: absolute;
  top: 0;
  overflow: hidden;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
  border: 1px solid #d4c2a8;
  transform-origin: left center;
  transition: transform 1s ease, z-index 1s;
}

.page.right {
  left: 50%;
  transform-origin: right center;
}

.page-content {
  padding: 30px;
  height: 100%;
  background: linear-gradient(90deg, #fdf5e6 0%, #f5ebd2 100%);
}

.flipped {
  transform: rotateY(-180deg);
  z-index: 1;
}

.book-controls {
  position: absolute;
  width: 100%;
  top: 50%;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
}

.control {
  pointer-events: all;
  cursor: pointer;
  background: rgba(150,111,51,0.3);
  padding: 20px;
  font-size: 24px;
  user-select: none;
  color: #3e2e1f;
  border-radius: 50%;
  transition: background 0.3s;
}

.control:hover {
  background: rgba(150,111,51,0.6);
}
</style>
</head>
<body>

<div class="book-container">
  <div class="book" id="book">
    <div class="page">
      <div class="page-content">
        <h2>Страница 1</h2>
        <p>Левая страница книги.</p>
      </div>
    </div>
    <div class="page right">
      <div class="page-content">
        <h2>Страница 2</h2>
        <p>Правая страница книги.</p>
      </div>
    </div>
    <div class="page">
      <div class="page-content">
        <h2>Страница 3</h2>
        <p>Следующая левая страница.</p>
      </div>
    </div>
    <div class="page right">
      <div class="page-content">
        <h2>Страница 4</h2>
        <p>Следующая правая страница.</p>
      </div>
    </div>

    <div class="book-controls">
      <div class="control" id="prev">&#9664;</div>
      <div class="control" id="next">&#9654;</div>
    </div>
  </div>
</div>

<script>
const pages = document.querySelectorAll('.page');
let current = 0;

document.getElementById('next').addEventListener('click', () => {
  if(current < pages.length) {
    pages[current].classList.add('flipped');
    current++;
  }
});

document.getElementById('prev').addEventListener('click', () => {
  if(current > 0) {
    current--;
    pages[current].classList.remove('flipped');
  }
});
</script>

</body>
</html>
