<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Старинная книга</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden; /* Скрываем полосы прокрутки */
  }

  /* КОНТЕЙНЕР КНИГИ */
  #book {
    width: 900px;  /* Ширина разворота (две страницы) */
    height: 600px; /* Высота книги */
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }

  /* ОБЩИЙ СТИЛЬ ДЛЯ ВСЕХ СТРАНИЦ */
  .page {
    position: relative;
    width: 450px;
    height: 600px;
    background-color: #f4e4c1; /* Базовый цвет бумаги */
    
    /* ПРИМЕНЯЕМ ТЕКСТУРУ БУМАГИ ИЗ image_0.png */
    background-image: url('image_0.png');
    
    /* Настройки текстуры, чтобы она покрывала весь лист */
    background-size: cover; 
    background-position: center;
    background-repeat: no-repeat;
    
    /* Убираем стандартные рамки, Turn.js добавит тени сам */
    box-shadow: none !important; 
    border: none !important;
  }

  /* --- СТИЛИЗАЦИЯ ТВЕРДОЙ ОБЛОЖКИ (ПЕРВАЯ И ПОСЛЕДНЯЯ СТРАНИЦЫ) --- */
  /* Мы используем CSS для имитации твердой обложки */
  
  /* Передняя обложка */
  #book .p1 {
    background: #5a3b1e; /* Коричневая кожа */
    border-radius: 5px 0 0 5px;
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
    color: transparent; /* Скрываем текст, если он есть */
  }
  
  /* Задняя обложка */
  #book .p4 { /* 4 - последняя страница в нашем примере */
    background: #5a3b1e;
    border-radius: 0 5px 5px 0;
    box-shadow: inset -2px 2px 5px rgba(0,0,0,0.5);
    color: transparent;
  }

  /* --- СТИЛИЗАЦИЯ ВНУТРЕННИХ СТРАНИЦ (МЯГКИХ) --- */
  .page:not(.p1):not(.p4) {
    /* Дополнительный градиент для глубины в корешке */
    background-image: 
      linear-gradient(to right, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 10%),
      url('image_0.png');
    background-size: cover;
  }

  /* Текст на внутренних страницах (если нужен) */
  .page-content {
    padding: 50px;
    font-family: 'Georgia', serif;
    font-size: 1.2em;
    line-height: 1.6;
    color: transparent; /* Скрываем текст по требованию */
  }

  /* КНОПКИ (Дополнительно, для удобства) */
  .controls {
    position: absolute;
    bottom: 20px;
    display: flex;
    gap: 20px;
  }

  .btn {
    cursor: pointer;
    background: rgba(120,80,30,0.4);
    padding: 10px 20px;
    color: #fff;
    border-radius: 5px;
    user-select: none;
  }
</style>
</head>
<body>

<div id="book">
  <div class="page p1 hard"></div>

  <div class="page p2">
    <div class="page-content">
      <p>Здесь мог бы быть ваш текст...</p>
    </div>
  </div>

  <div class="page p3">
    <div class="page-content">
      <p>...но все надписи убраны.</p>
    </div>
  </div>

  <div class="page p4 hard"></div>
</div>

<div class="controls">
  <div class="btn" id="prev">&#9664; Назад</div>
  <div class="btn" id="next">Вперед &#9654;</div>
</div>

<script>
  $(document).ready(function() {
    // ИНИЦИАЛИЗАЦИЯ TURN.JS
    $('#book').turn({
      width: 900,       // Общая ширина разворота
      height: 600,      // Высота книги
      autoCenter: true, // Центрировать книгу
      duration: 1500,   // Плавность анимации (медленно)
      gradients: true,  // Показывать градиенты и тени при сгибе
      acceleration: true, // Использовать аппаратное ускорение
      
      // Настройка сгиба уголка
      elevation: 50     // Высота подъема уголка
    });

    // ОБРАБОТКА КНОПОК
    $('#prev').click(function() {
      $('#book').turn('previous');
    });

    $('#next').click(function() {
      $('#book').turn('next');
    });

    // ПОДДЕРЖКА СТРЕЛОК КЛАВИАТУРЫ
    $(window).bind('keydown', function(e){
      if (e.keyCode==37) // Лево
        $('#book').turn('previous');
      else if (e.keyCode==39) // Право
        $('#book').turn('next');
    });
  });
</script>

</body>
</html>
